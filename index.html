<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rain Team Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="battle-container">
        <!-- Start Overlay -->
        <div id="start-screen">
            <button id="start-btn">START BATTLE</button>
        </div>

        <div id="game-ui" class="hidden">
            <div id="opp-side">
                <div class="stats"><span>Garchomp</span> <div class="hp"><div id="opp-hp"></div></div></div>
                <img id="opp-sprite" src="">
            </div>
            
            <div id="player-side">
                <img id="player-sprite" src="">
                <div class="stats"><span id="p-name">Articuno</span> <div class="hp"><div id="p-hp"></div></div></div>
            </div>

            <div id="controls">
                <div id="battle-log">Initializing...</div>
                <div id="move-grid"></div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
